<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Chaos: Intel Update</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; overflow: hidden; }
        .stats { font-size: 20px; font-weight: bold; margin: 10px 0; color: #f1c40f; text-shadow: 2px 2px #000; }
        .controls { margin-bottom: 5px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; min-height: 60px; padding: 10px; background: #2c3e50; border-top: 3px solid #34495e; }
        .btn { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: 2px solid #fff; font-weight: bold; background: #34495e; color: white; transition: 0.1s; }
        .btn-summon { background: #e74c3c; border-color: #ff7675; box-shadow: 0 4px #c0392b; }
        .btn-summon:active { box-shadow: 0 0; transform: translateY(4px); }
        .btn-info { background: #8e44ad; border-color: #a29bfe; }
        .active { background: #e67e22 !important; border-color: #f1c40f; box-shadow: inset 0 0 10px #000; }
        canvas { background: #34495e; border: 5px solid #2c3e50; display: block; margin: 0 auto; image-rendering: pixelated; }
        #inventory-label { font-size: 12px; color: #bdc3c7; margin-bottom: 5px; font-style: italic; }
        .map-select { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .map-card { border: 2px solid white; padding: 15px; cursor: pointer; width: 140px; background: #34495e; border-radius: 8px; font-weight: bold; }
        .map-card:hover { border-color: #f1c40f; background: #455a64; }
    </style>
</head>
<body>

    <div id="gameUI">
        <div class="stats">
            🌊 WAVE: <span id="waveText">1</span> | 💰 COINS: <span id="moneyText">20</span> | ❤️ LIVES: <span id="livesText">10</span>
        </div>
        <div id="gameplayButtons" style="display:none; margin-bottom:10px;">
            <button class="btn btn-summon" onclick="summonUnit()">✨ SUMMON (10 COINS)</button>
            <button class="btn btn-info" onclick="toggleInfo()">📖 INFO BOOK</button>
        </div>
        <div id="inventory-label">PICK A MAP TO BEGIN</div>
        <div class="controls" id="unitBar"></div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="mapMenu" class="map-select">
        <div class="map-card" onclick="startMap('Kitchen')">🍳 KITCHEN</div>
        <div class="map-card" onclick="startMap('Freezer')">❄️ FREEZER</div>
        <div class="map-card" onclick="startMap('Pantry')">🥫 PANTRY</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let money = 20, lives = 10, frame = 0, wave = 1;
        let enemies = [], towers = [], projectiles = [];
        let inventory = [];
        let gameState = 'MAP_SELECT'; 
        let selectedType = null;
        let inspectedUnit = null;
        let inspectedEnemy = null;
        let currentMap = 'Kitchen';

        const UNIT_DATA = {
            bread: { name: "Stale Bread", dmg: 8, color: "#d2b48c", rarity: "Common" },
            salt: { name: "Salt Shaker", dmg: 18, color: "#ecf0f1", rarity: "Rare" },
            honey: { name: "Honey Jar", dmg: 2, color: "#f1c40f", rarity: "Rare", slow: 0.5 },
            chili: { name: "Fire Chili", dmg: 55, color: "#c0392b", rarity: "Epic" },
            toaster: { name: "Pro Toaster", dmg: 110, color: "#7f8c8d", rarity: "Epic" },
            pineapple: { name: "GOD PINEAPPLE", dmg: 400, color: "#fbc531", rarity: "GODLY" }
        };

        function updateUI() {
            document.getElementById('moneyText').innerText = Math.floor(money);
            document.getElementById('livesText').innerText = lives;
            document.getElementById('waveText').innerText = wave;
        }

        function startMap(mapName) {
            currentMap = mapName;
            gameState = 'PLAYING';
            document.getElementById('mapMenu').style.display = 'none';
            document.getElementById('gameplayButtons').style.display = 'block';
            document.getElementById('inventory-label').innerText = "EQUIP A UNIT, THEN CLICK THE FLOOR";
            updateUI();
        }

        function toggleInfo() {
            gameState = (gameState === 'INFO') ? 'PLAYING' : 'INFO';
        }

        function summonUnit() {
            if (money < 10) return;
            money -= 10;
            let rand = Math.random();
            let result = rand < 0.5 ? 'bread' : (rand < 0.8 ? (Math.random() > 0.5 ? 'salt' : 'honey') : (rand < 0.96 ? (Math.random() > 0.5 ? 'chili' : 'toaster') : 'pineapple'));
            inventory.push(result);
            refreshUnitBar();
            updateUI();
        }

        function refreshUnitBar() {
            const bar = document.getElementById('unitBar');
            bar.innerHTML = "";
            inventory.forEach((type, index) => {
                let btn = document.createElement('button');
                btn.className = 'btn';
                if (selectedType && selectedType.index === index) btn.classList.add('active');
                btn.innerHTML = UNIT_DATA[type].name;
                btn.onclick = () => { selectedType = { type: type, index: index }; refreshUnitBar(); };
                bar.appendChild(btn);
            });
        }

        function isPointOnPath(x, y) {
            if (currentMap === 'Kitchen') return y >= 150 && y <= 250;
            if (currentMap === 'Freezer') {
                if (x < 350) return y >= 50 && y <= 150;
                if (x >= 350 && x <= 450) return y >= 50 && y <= 350;
                return y >= 250 && y <= 350;
            }
            if (currentMap === 'Pantry') {
                if (x < 650 && y < 150) return y >= 50 && y <= 150;
                if (x >= 650) return y >= 50 && y <= 350;
                return y >= 250 && y <= 350;
            }
            return false;
        }

        function drawMap() {
            ctx.fillStyle = currentMap === 'Freezer' ? "#2980b9" : (currentMap === 'Pantry' ? "#5d4037" : "#d35400");
            ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#bdc3c7";
            if (currentMap === 'Kitchen') ctx.fillRect(0, 150, 800, 100);
            else if (currentMap === 'Freezer') {
                ctx.fillRect(0, 50, 400, 100); ctx.fillRect(350, 50, 100, 300); ctx.fillRect(350, 250, 450, 100);
            } else if (currentMap === 'Pantry') {
                ctx.fillRect(0, 50, 700, 100); ctx.fillRect(650, 50, 100, 300); ctx.fillRect(0, 250, 800, 100);
            }
        }

        function drawSkin(x, y, type, isEnemy = false) {
            ctx.save(); ctx.translate(x, y);
            if (!isEnemy) {
                if (type === 'bread') {
                    ctx.fillStyle = "#d2b48c"; ctx.beginPath(); ctx.roundRect(-12, -10, 24, 20, 5); ctx.fill();
                    ctx.fillStyle = "#8d6e63"; ctx.fillRect(-12, -10, 24, 5);
                } else if (type === 'salt') {
                    ctx.fillStyle = "#ecf0f1"; ctx.fillRect(-8, -15, 16, 25);
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(-10, -18, 20, 5);
                } else if (type === 'honey') {
                    ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#d35400"; ctx.fillRect(-12, -14, 24, 6);
                } else if (type === 'chili') {
                    ctx.fillStyle = "#c0392b"; ctx.beginPath(); ctx.ellipse(0, 5, 8, 15, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#27ae60"; ctx.fillRect(-2, -15, 4, 8);
                } else if (type === 'toaster') {
                    ctx.fillStyle = "#7f8c8d"; ctx.beginPath(); ctx.roundRect(-18, -12, 36, 24, 4); ctx.fill();
                    ctx.fillStyle = "#333"; ctx.fillRect(-12, -8, 24, 4);
                } else if (type === 'pineapple') {
                    ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.ellipse(0, 5, 15, 20, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#27ae60"; for(let i=-1; i<=1; i++) { ctx.beginPath(); ctx.moveTo(i*8, -10); ctx.lineTo(i*12, -28); ctx.lineTo((i*8)+5, -10); ctx.fill(); }
                }
            } else {
                ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.roundRect(-12, -10, 24, 25, 3); ctx.fill();
                ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(0, -18, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(-12, -28); ctx.lineTo(12, -28); ctx.lineTo(12, -45); ctx.lineTo(-12, -45); ctx.fill();
            }
            ctx.restore();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (gameState !== 'PLAYING') return;

            // Check for Enemy Inspection
            let clickedEnemy = enemies.find(en => Math.hypot(en.x - x, en.y - y) < 30);
            if (clickedEnemy) {
                inspectedEnemy = clickedEnemy;
                inspectedUnit = null;
                return;
            } else {
                inspectedEnemy = null;
            }

            // Check for Unit Inspection
            let clickedUnit = towers.find(t => Math.hypot(t.x - x, t.y - y) < 25);
            if (clickedUnit) {
                inspectedUnit = clickedUnit;
                return;
            } else {
                inspectedUnit = null;
            }

            // Placement
            if (selectedType !== null && !isPointOnPath(x, y)) {
                towers.push({ x: x, y: y, type: selectedType.type, lastShot: 0, stats: UNIT_DATA[selectedType.type] });
                inventory.splice(selectedType.index, 1);
                selectedType = null;
                refreshUnitBar();
            }
        });

        function gameLoop() {
            frame++;
            ctx.clearRect(0, 0, 800, 400);

            if (gameState === 'PLAYING' || gameState === 'INFO') {
                if (frame % 60 === 0) { money += 1; updateUI(); }
                drawMap();

                if (frame % 100 === 0 && gameState === 'PLAYING') {
                    let startY = currentMap === 'Kitchen' ? 200 : 100;
                    enemies.push({ x:-30, y:startY, hp:50+(wave*30), maxHp:50+(wave*30), baseSpeed:1.2+(wave*0.1), speed:1.2+(wave*0.1), type:'chef', slowTimer: 0 });
                }
                if (frame % 2000 === 0) { wave++; updateUI(); }

                towers.forEach(t => {
                    drawSkin(t.x, t.y, t.type);
                    enemies.forEach(e => {
                        let d = Math.hypot(e.x - t.x, e.y - t.y);
                        let rate = t.type === 'toaster' ? 80 : (t.type === 'honey' ? 60 : 35);
                        if (d < 170 && frame > t.lastShot + rate) {
                            t.lastShot = frame;
                            if (t.type === 'toaster' || t.type === 'honey') {
                                projectiles.push({ x: t.x, y: t.y, target: e, type: t.type === 'toaster' ? 'burnt_toast' : 'honey_blob', dmg: t.stats.dmg, slow: t.stats.slow });
                            } else {
                                e.hp -= t.stats.dmg; ctx.strokeStyle = t.stats.color; ctx.lineWidth = 3;
                                ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(e.x, e.y-10); ctx.stroke();
                            }
                        }
                    });
                });

                projectiles.forEach((p, i) => {
                    let dx = p.target.x - p.x, dy = p.target.y - p.y, dist = Math.hypot(dx, dy);
                    p.x += (dx/dist) * 6; p.y += (dy/dist) * 6;
                    ctx.fillStyle = p.type === 'honey_blob' ? "#f1c40f" : "#3e2723";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
                    if (dist < 10) { p.target.hp -= p.dmg; if (p.slow) { p.target.speed = p.target.baseSpeed * p.slow; p.target.slowTimer = 90; } projectiles.splice(i, 1); }
                });

                enemies.forEach((e, i) => {
                    if (e.slowTimer > 0) { e.slowTimer--; if (e.slowTimer <= 0) e.speed = e.baseSpeed; }
                    if (currentMap === 'Kitchen') e.x += e.speed;
                    else if (currentMap === 'Freezer') {
                        if (e.x < 400 && e.y < 150) e.x += e.speed; else if (e.x >= 400 && e.y < 300) e.y += e.speed; else e.x += e.speed;
                    } else if (currentMap === 'Pantry') {
                        if (e.x < 700 && e.y < 150) e.x += e.speed; else if (e.x >= 700 && e.y < 300) e.y += e.speed; else e.x -= e.speed;
                    }
                    drawSkin(e.x, e.y, e.type, true);
                    ctx.fillStyle = "black"; ctx.fillRect(e.x-15, e.y-55, 30, 5);
                    ctx.fillStyle = "red"; ctx.fillRect(e.x-15, e.y-55, (e.hp/e.maxHp)*30, 5);
                    if (e.hp <= 0) { 
                        if (inspectedEnemy === e) inspectedEnemy = null;
                        enemies.splice(i, 1); money += 2; updateUI(); 
                    }
                    else if (e.x > 850 || e.x < -100) { enemies.splice(i, 1); lives--; updateUI(); if(lives <= 0) gameState = 'GAMEOVER'; }
                });

                // Inspection Windows
                if (inspectedUnit) {
                    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(inspectedUnit.x+20, inspectedUnit.y-40, 140, 50);
                    ctx.fillStyle = "#f1c40f"; ctx.font = "12px Arial"; ctx.textAlign="left";
                    ctx.fillText(inspectedUnit.stats.name, inspectedUnit.x+25, inspectedUnit.y-25);
                    ctx.fillStyle = "white"; ctx.fillText("DMG: " + inspectedUnit.stats.dmg, inspectedUnit.x+25, inspectedUnit.y-10);
                }

                if (inspectedEnemy) {
                    ctx.fillStyle = "rgba(44, 62, 80, 0.9)"; ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 2;
                    ctx.fillRect(inspectedEnemy.x+20, inspectedEnemy.y-60, 150, 60);
                    ctx.strokeRect(inspectedEnemy.x+20, inspectedEnemy.y-60, 150, 60);
                    ctx.fillStyle = "#ff7675"; ctx.font = "bold 12px Arial"; ctx.textAlign="left";
                    ctx.fillText("EVIL CHEF", inspectedEnemy.x+25, inspectedEnemy.y-45);
                    ctx.fillStyle = "white"; 
                    ctx.fillText("HP: " + Math.ceil(inspectedEnemy.hp) + "/" + inspectedEnemy.maxHp, inspectedEnemy.x+25, inspectedEnemy.y-30);
                    ctx.fillText("SPEED: " + inspectedEnemy.speed.toFixed(1), inspectedEnemy.x+25, inspectedEnemy.y-15);
                }
            }

            if (gameState === 'INFO') {
                ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(100, 50, 600, 300);
                ctx.fillStyle = "#f1c40f"; ctx.font = "bold 20px Courier"; ctx.textAlign="center";
                ctx.fillText("--- KITCHEN MANIFEST ---", 400, 85);
                let idx = 0;
                for (let k in UNIT_DATA) {
                    drawSkin(200, 130 + (idx*35), k);
                    ctx.fillStyle = "white"; ctx.font = "14px Courier"; ctx.textAlign = "left";
                    ctx.fillText(`${UNIT_DATA[k].name}: ${UNIT_DATA[k].dmg} DMG`, 240, 135 + (idx*35));
                    idx++;
                }
                ctx.textAlign = "center"; ctx.fillStyle = "#e67e22"; ctx.fillText("CLICK INFO TO CLOSE", 400, 320);
            }

            if (gameState === 'GAMEOVER') {
                ctx.fillStyle = "black"; ctx.fillRect(0, 0, 800, 400);
                ctx.fillStyle = "red"; ctx.font = "40px Courier"; ctx.textAlign="center";
                ctx.fillText("KITCHEN OVERRUN", 400, 200);
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
